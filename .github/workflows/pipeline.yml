name: Fraud Detection Pipeline

on:
  # Run automatically every day at midnight
  schedule:
    - cron: '0 0 * * *'

  # Run every time you push to main branch
  push:
    branches:
      - main

  # Run manually from GitHub UI (Actions tab → Run workflow button)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip packages (speeds up future runs)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 5: Run your pipeline (clean + train models)
      - name: Run pipeline
        run: python pipeline_runner.py

      # Step 6: Save output files as downloadable artifacts
      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: outputs/
          retention-days: 30